[build]
  command = "npx eleventy"
  publish = "_site"

# Security headers applied to all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'"

# Long-lived cache for versioned assets (CSS, fonts)
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

# Short-lived cache for HTML pages (re-check after 5 minutes)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/modul/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/tools/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Downloadable PDFs — cache for 7 days
[[headers]]
  for = "/handouts/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
