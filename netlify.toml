[build]
  # Keep Netlify deploys aligned with CI and package-lock.json
  command = "npm ci && npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--include=dev"

# Redirect /tools/ overview to /werkzeuge/ (fix broken entry-path link, keep incoming links working)
[[redirects]]
  from = "/tools/"
  to = "/werkzeuge/"
  status = 301

# Security headers applied to all pages
# Inline scripts have been extracted; inline styles still remain in templates and
# generated interactive markup, so style-src keeps 'unsafe-inline' for now.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self'; frame-src 'self'; object-src 'none'; base-uri 'self'"

# Cache for static assets (CSS, fonts) — revalidate on each visit so deploys take effect
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

# Short-lived cache for HTML pages (re-check after 5 minutes)
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/modul/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/tools/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/module/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/werkzeuge/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/notfall/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/quellen/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/impressum/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

# Downloadable PDFs — cache for 7 days
[[headers]]
  for = "/handouts/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/downloads/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# P3 Audit: Generierte Bild-Assets (AVIF/WebP/JPEG) — lang cachen (content-hashed)
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
