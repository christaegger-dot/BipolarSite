  <text x="474" y="111" fill="#7A5630" font-family="DM Sans, sans-serif" font-size="16" font-weight="700">Gespräch vereinbaren</text>
  <text x="474" y="137" fill="#475569" font-family="DM Sans, sans-serif" font-size="14">Ein erster Termin darf unfertig sein.</text>

  <rect x="84" y="256" width="52" height="52" rx="16" fill="#B5583C"/>
