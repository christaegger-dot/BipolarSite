<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seite nicht gefunden | PUK Zürich</title>
<meta name="robots" content="noindex">
<meta name="description" content="Seite nicht gefunden. Bitte überprüfen Sie die URL oder kehren Sie zur Startseite zurück.">
<style>
  :root{--bg:#FAFAF7;--card:#ffffff;--text:#1c2b3a;--muted:#475569;--accent:#1E656D;--border:#e2e8f0}
  *{box-sizing:border-box}
  body{margin:0;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{max-width:640px;width:100%;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:40px 32px;box-shadow:0 12px 40px rgba(28,43,58,.08)}
  h1{margin:0 0 12px;font-size:2rem;font-family:'DM Serif Display',serif}
  p{margin:0 0 14px;line-height:1.6;color:var(--muted)}
  .actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}
  a{display:inline-flex;align-items:center;justify-content:center;padding:12px 18px;border-radius:999px;text-decoration:none;font-weight:700}
  .primary{background:var(--accent);color:#fff}
  .secondary{border:1px solid var(--border);color:var(--text);background:#fff}
  *:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
  .skip-link{position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;z-index:999}
  .skip-link:focus{position:fixed!important;top:12px;left:12px;width:auto;height:auto;padding:12px 20px;background:var(--accent);color:white;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:10000;text-decoration:none}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/tarif-kompass-theme.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Direkt zum Inhalt</a>
  <main class="card" id="main-content">
    <h1>Diese Seite wurde nicht gefunden.</h1>
    <p>Prüfen Sie die Adresse oder gehen Sie zurück zur Startseite. Alle Inhalte bleiben über die Modulübersicht erreichbar.</p>
    <div class="actions">
      <a class="primary" href="/">Zur Startseite</a>
      <a class="secondary" href="/#module">Zu den Modulen</a>
    </div>
  </main>
</body>
</html>
