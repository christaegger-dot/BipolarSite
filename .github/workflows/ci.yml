name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-and-lint:
    name: Build, Lint & HTML Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build site
        run: npm run build
      - name: HTML Validate
        run: npm run lint:html
      - name: CSS Lint
        run: npm run lint:css

  accessibility:
    name: Accessibility Check (pa11y-ci)
    runs-on: ubuntu-latest
    needs: build-and-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build site
        run: npm run build
      - name: Start local server
        run: npx http-server _site -p 8080 --silent &
      - name: Wait for server to be ready
        run: npx wait-on http://localhost:8080 --timeout 30000
      - name: Run accessibility checks
        run: npm run lint:a11y

  lighthouse:
    name: Lighthouse CI (Performance, A11y, SEO )
    runs-on: ubuntu-latest
    needs: build-and-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build site
        run: npm run build
      - name: Start local server
        run: npx http-server _site -p 8080 --silent &
      - name: Wait for server to be ready
        run: npx wait-on http://localhost:8080 --timeout 30000
      - name: Run Lighthouse CI
        run: npx @lhci/cli@0.14.x autorun --config=lighthouserc.json
